<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/vector-logos/unicornLogo.png" type="image/png">
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="/css/dark-mode.css">
  <title>Access Restricted - UniConn</title>
</head>
<body>
  <nav class="navbar">
    <img class="logo-icon" src="/vector-logos/unicornLogo.png" alt="UniConn Logo">
    <a href="/login" class="main">UniConn</a>
    <button id="dark-mode-toggle" class="dark-mode-btn" style="margin-left:auto" title="Toggle dark mode">🌙</button>
  </nav><hr><br><br>

  <div class="login-container">
    <div class="header"><h3>Access Restricted</h3></div>
    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;width:310px;">
      <p style="margin:0 0 16px;color:#555;">You must be logged in to view this page.</p>
      <a href="/login" style="text-decoration:none;width:100%">
        <button type="button" style="width:100%">Go to Login</button>
      </a>
      <div class="register-link" style="margin-top:10px">
        <p>Don't have an account? <a href="/register">Register!</a></p>
      </div>
    </div>
  </div>

  <script src="/js/darkMode.js" defer></script>
</body>
</html>
