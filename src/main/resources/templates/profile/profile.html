<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="profile.css">
  <title>Register - UniConn</title>
</head>

<body>
  <nav class="navbar">
    <div class="navbar-left">
      <img class="logo-icon" src="/Vector Logos/unicornLogo.png" alt="UniConn Logo" width="100" height="100">
      <a href="userFeed.html" class="main">UniConn</a><hr><br>
    </div>

    <div class="navbar-right">
      <a href="#" class="nav-icon" title="Search">
        <img src="/Vector Logos/magnifyGlass.svg" alt="Search" width="36" height="36">
      </a>

      <a href="#" class="nav-icon" title="Add">
        <img src="/Vector Logos/addPost.svg" alt="Add Post" width="36" height="36">

      <a href="#" class="nav-icon" title="Communities">
        <img src="/Vector Logos/clubLogo.svg" alt="Communities" width="36" height="36">
      
      <a href="#" class="nav-icon" title="Profile">
        <img src="/Vector Logos/usernameSignIn.svg" alt="Profile" width="26" height="36">
      </a>
      <span class="signout-divider">|</span>
      <a href="#" class="signout-link">Sign Out</a>
    </div>
  </nav><hr><br>

  <div class="wrap">
    <form action="http://localhost:9090/auth/register" method="POST"></form>
  
<!-- left container: profile stats-->
    <div class="left-container">
        <div class="header-left"><h3>Profile</h3></div>
        
      <div class="profile-content">
        
        <div class="profile-top">
          <div class="profile-wrap"><br>
          <!-- profile img -->
            <img th:src="${avatarUrl}" src="/Vector Logos/usernameSignIn.svg" alt="User Avatar" width="72" height="72" class="avatar-img">
          </div>
          <!-- follower/friend count -->
          <div class="profile-stats">
            <div class="stat">
              <span class="stat-num" th:text="${followerCount}">0</span>
              <span class="stat-label">followers</span>
            </div>
            <div class="stat">
              <span class="stat-num" th:text="${friendCount}">0</span>
              <span class="stat-label">friends</span>
            </div>
          </div>
        </div><hr id="left-container-break">

        <!-- biography -->
        <div class="info-section">
          <p class="info-label">Biography</p>
          <p class="info-value" th:text="${biography}">biography</p>
        </div>

        <!-- major information -->
        <div class="info-section">
          <p class="info-label">Major:</p>
          <p class="info-value" th:text="${major}">major</p>
        </div>

        <!-- year information -->
        <div class="info-section">
          <p class="info-label">Year:</p>
          <p class="info-value" th:text="${year}">year</p>
        </div>

        <!--hobbies information -->
        <div class="info-section">
          <p class="info-label">Hobbies:</p>
          <p class="info-value" th:text="${hobbies}">hobbies</p>
        </div>
    </div><hr id="left-container-break">

    <!--communities section-->
      <div class="club-row">
        <img src="/Vector Logos/clubLogo.svg" alt="Community" width="38" height="38" class="club-icon">
        <span class="community-name" th:text="${clubName}">club name</span>
      </div>
  </div><div>
</div> <!--end of left-container-->
    

<!--right container: post history -->
    <div class="right-container">
        <div class="header-right"><h3></h3></div>
    </div> <!--end of right-container-->

    
  </div>

</form>
</body>

</html>
