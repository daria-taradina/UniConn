<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/profile.css}">
  <title>Profile - UniConn</title>
</head>

<body>
  <nav class="navbar">
    <div class="navbar-left">
      <img class="logo-icon" th:src="@{/vector-logos/unicornLogo.png}" alt="UniConn Logo" width="100" height="100">
      <a href="/" class="main">UniConn</a><hr><br>
    </div>

    <div class="navbar-right">
      <a href="#" class="nav-icon" title="Search" id="search-toggle">
        <img th:src="@{/vector-logos/magnifyGlass.svg}" alt="Search" width="36" height="36">
      </a>

      <a href="#" class="nav-icon" title="Notifications" id="notification-toggle">
        <img th:src="@{/vector-logos/notifLogo.svg}" alt="Notifications" width="34" height="34">
      </a>

      <a th:href="@{/communities}" class="nav-icon" title="Communities">
        <img th:src="@{/vector-logos/clubLogo.svg}" alt="Communities" width="36" height="36">
      </a>

      <a th:href="@{/profile}" class="nav-icon" title="Profile">
        <img th:src="@{/vector-logos/usernameSignIn.svg}" alt="Profile" width="26" height="36">
      </a>
      <span class="signout-divider">|</span>
      <a href="#" class="signout-link" onclick="localStorage.removeItem('jwt'); window.location.href='/login'; return false;">Sign Out</a>
    </div>
  </nav><hr><br>

<!-- SEARCH MODAL -->
  <div id="search-modal" class="search-modal-overlay" aria-hidden="true">
    <div class="search-modal">
      <div class="header-right">
        <h3 class="search-modal-title">Search</h3>
      </div>
      <button class="search-modal-close" id="search-close" aria-label="Close">&times;</button>
      <input type="text" id="search-input" class="search-modal-input" placeholder="Search by title, username, or community...">
      <ul id="search-results" class="search-results-list"></ul>
    </div>
  </div>

<!-- NOTIFICATIONS MODAL -->
<div id="notification-modal" class="search-modal-overlay" aria-hidden="true">
  <div class="search-modal">
    <div class="header-right">
      <h3 class="search-modal-title">Notifications</h3>
    </div>
    <button class="search-modal-close" id="notification-close" aria-label="Close">&times;</button>
    <ul id="notification-list" class="notification-list">
      <li class="notification-empty">No notifications yet.</li>
    </ul>
  </div>
</div>

<!--EDIT PROFILE MODAL-->
<div id="edit-profile-modal" class="search-modal-overlay" aria-hidden="true">
  <div class="search-modal create-post-modal">
    <div class="header-right">
      <h3 class="search-modal-title">Edit Profile</h3>
    </div>
    <button class="search-modal-close" id="edit-profile-close" aria-label="Close">&times;</button>

    <div class="create-post-title-wrap">
      <input type="text" id="edit-name-input" class="create-post-title-input" placeholder="Display name"
             th:value="${name}">
    </div>

    <div class="create-post-field">
      <textarea id="edit-bio-input" class="create-post-body edit-bio" placeholder="Bio" th:text="${userBio}"></textarea>
    </div>

    <p id="edit-profile-message" class="profile-message" style="display:none"></p>

    <div class="create-post-action">
      <button type="button" class="create-post-btn-post" id="edit-profile-submit">Save</button>
    </div>
  </div>
</div>


  <div class="wrap">

<!-- LEFT CONTAINER: profile sidebar -->
    <div class="left-container">
      <div class="header-left"><h3>Profile</h3></div>

      <div class="profile-content">

        <!-- profile picture and username -->
        <div class="profile-top">
          <img th:src="${profilePicture}" alt="User Avatar" class="avatar-img">
          <div class="profile-right">
            <span class="profile-username" th:text="'@' + ${username}">@username</span>
            <div class="profile-stats">
              <div class="stat">
                <span class="stat-num" th:text="${followerCount}">0</span>
                <span class="stat-label">followers</span>
              </div>
              <div class="stat">
                <span class="stat-num" th:text="${followingCount}">0</span>
                <span class="stat-label">following</span>
              </div>
              <div class="stat">
                <span class="stat-num" th:text="${communityCount}">0</span>
                <span class="stat-label">communities</span>
              </div>
            </div>
          </div>
          <button type="button" id="edit-profile-toggle" class="profile-action-btn edit-profile-btn">
            <img th:src="@{/vector-logos/addPost.svg}" alt="" class="action-btn-icon"> Edit Profile
          </button>
        </div>

        <!-- bio section -->
        <div class="profile-bio-section">
          <span class="profile-name" th:if="${name != null and !#strings.isEmpty(name)}" th:text="${name}"></span>
          <p class="profile-bio" th:if="${userBio != null and !#strings.isEmpty(userBio)}" th:text="${userBio}"></p>
          <!-- if bio empty-->
          <p class="profile-bio-empty"
             th:if="${(name == null or #strings.isEmpty(name)) and (userBio == null or #strings.isEmpty(userBio))}">
            No bio yet.
          </p>
        </div>

        <hr id="left-container-break">

      </div>
    </div> <!--end of left-container-->
    

<!--RIGHT CONTAINER: post history -->
    <div class="right-container">
        <div class="header-right"><h3></h3></div>
    </div> <!--end of right-container-->

  </div>

<script th:src="@{/js/modalManager.js}" defer></script>
<script th:src="@{/js/notificationFunction.js}" defer></script>
<script th:src="@{/js/searchFunction.js}" defer></script>
<script th:src="@{/js/editProfileFunction.js}" defer></script>
</body>

</html>
