<!-- My Profile -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" th:href="@{/vector-logos/unicornLogo.png}" type="image/png">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/modals.css}">
  <link rel="stylesheet" th:href="@{/css/postCards.css}">
  <link rel="stylesheet" th:href="@{/css/profile.css}">
  <link rel="stylesheet" th:href="@{/css/followButton.css}">
  <link rel="stylesheet" th:href="@{/css/tagInput.css}">
  <link rel="stylesheet" th:href="@{/css/dark-mode.css}">
  <title>Profile - UniConn</title>
</head>

<body>
  <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
  <th:block th:replace="~{fragments/navbar :: notification-modal}"></th:block>
  <div th:replace="~{fragments/navbar :: search-modal}"></div>

  <div th:replace="~{fragments/modals :: create-community-modal}"></div>
  <div th:replace="~{fragments/modals :: create-post-modal}"></div>

  <!-- COMMUNITIES MODAL -->
  <div id="communities-modal" class="search-modal-overlay" aria-hidden="true">
    <div class="search-modal">
      <div class="header-right">
        <h3 class="search-modal-title">Communities</h3>
      </div>
      <button class="search-modal-close" id="communities-modal-close" aria-label="Close">&times;</button>
      <input type="text" id="communities-modal-search" class="search-modal-input" placeholder="Search communities...">
      <ul id="communities-modal-list" class="follow-list"></ul>
    </div>
  </div>

  <!-- FOLLOWERS / FOLLOWING MODAL -->
  <div id="follow-list-modal" class="search-modal-overlay" aria-hidden="true">
    <div class="search-modal">
      <div class="header-right">
        <h3 class="search-modal-title" id="follow-list-title">Followers</h3>
      </div>
      <button class="search-modal-close" id="follow-list-close" aria-label="Close">&times;</button>
      <input type="text" id="follow-search" class="search-modal-input" placeholder="Search by username...">
      <ul id="follow-list" class="follow-list"></ul>
    </div>
  </div>

  <div th:replace="~{fragments/modals :: post-view-modal}"></div>

  <!--EDIT PROFILE MODAL-->
  <div id="edit-profile-modal" class="search-modal-overlay" aria-hidden="true">
    <div class="search-modal create-post-modal">
      <div class="header-right">
        <h3 class="search-modal-title">Edit Profile</h3>
      </div>
      <button class="search-modal-close" id="edit-profile-close" aria-label="Close">&times;</button>

      <div class="create-post-title-wrap">
        <input type="text" id="edit-name-input" class="create-post-title-input" placeholder="Display name">
      </div>

      <div class="create-post-field">
        <textarea id="edit-bio-input" class="create-post-body edit-bio" placeholder="Bio"></textarea>
      </div>

      <p id="edit-profile-message" class="profile-message" style="display:none"></p>

      <div class="create-post-action">
        <button type="button" class="create-post-btn-post" id="edit-profile-submit">Save</button>
      </div>
    </div>
  </div>


  <div class="wrap">

<!-- LEFT CONTAINER: profile sidebar -->
    <div class="left-container">
      <div class="header-left"><h3>My Profile</h3></div>

      <div class="profile-content">

        <!-- profile picture and username -->
        <div class="profile-top">
          <div class="profile-avatar-wrap" id="profile-avatar-wrap">
            <img id="profile-picture-img" src="/vector-logos/usernameSignIn.svg" alt="User Avatar" class="avatar-img">
            <div class="profile-avatar-overlay">Choose Photo</div>
            <input type="file" id="profile-picture-input" accept="image/jpeg,image/png,image/webp" style="display:none">
          </div>
          <div class="profile-right">
            <span class="profile-username" id="profile-username">u/</span>
            <span class="profile-fullname" id="profile-fullname"></span>
            <div class="profile-stats">
              <div class="stat stat-clickable" id="stat-followers">
                <span class="stat-num" id="follower-count">0</span>
                <span class="stat-label">followers</span>
              </div>
              <div class="stat stat-clickable" id="stat-following">
                <span class="stat-num" id="following-count">0</span>
                <span class="stat-label">following</span>
              </div>
              <div class="stat stat-clickable" id="stat-communities">
                <span class="stat-num" id="community-count">0</span>
                <span class="stat-label">communities</span>
              </div>
            </div>
          </div>
          <button type="button" id="edit-profile-toggle" class="profile-action-btn edit-profile-btn">
            <img th:src="@{/vector-logos/addPost.svg}" alt="" class="action-btn-icon"> Edit Profile
          </button>
        </div>

        <!-- bio section -->
        <div class="profile-bio-section" id="profile-bio-section">
          <p class="profile-bio-empty">No bio yet.</p>
        </div>

        <hr id="left-container-break">

        <div id="profile-posts-controls"></div>
        <div id="profile-posts-container"></div>

      </div>
    </div><!--end of left-container-->


  <!-- RIGHT CONTAINER: sidenav -->
  <div class="right-wrap">
    <div class="right-container">
      <div class="right-upper-container">
        <div class="explore-actions">
          <button type="button" class="explore-btn" onclick="window.location.href='/feed'">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/feedLogo.svg}" alt="" class="explore-btn-icon"> Feed</span>
          </button>
          <button type="button" class="explore-btn" onclick="window.location.href='/communities'">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/sparkleLogo.svg}" alt="" class="explore-btn-icon"> Explore Communities</span>
          </button>
          <button type="button" class="explore-btn" id="my-communities-btn" onclick="window.location.href='/my-communities'">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/clubLogo.svg}" alt="" class="explore-btn-icon"> My Communities</span>
          </button>
          <button type="button" class="explore-btn" id="create-community-toggle">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/addPostWhite.svg}" alt="" class="explore-btn-icon"> Create Community</span>
          </button>
          <button type="button" class="explore-btn" id="add-post-toggle">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/addPost.svg}" alt="" class="explore-btn-icon"> Create Post</span>
          </button>
        </div>
      </div>

      <!-- Trending Topics -->
      <div class="right-lower-container">
        <div class="header-right"><h3>Trending Topics</h3></div>
        <ul id="trending-tags-list" class="trending-tags-list"></ul>
      </div>

    </div>
  </div>

  </div>

<script src="/js/auth-guard.js"></script>
<script th:src="@{/js/darkMode.js}" defer></script>
<script th:src="@{/js/navbarPfp.js}" defer></script>
<script th:src="@{/js/trendingTags.js}" defer></script>
<script th:src="@{/js/gifPicker.js}" defer></script>
<script th:src="@{/js/emojiPicker.js}" defer></script>
<script th:src="@{/js/tagPostsModal.js}" defer></script>
<script th:src="@{/js/profileLoad.js}" defer></script>
<script th:src="@{/js/postCardRenderer.js}" defer></script>
<script th:src="@{/js/profilePostsLoad.js}" defer></script>
<script th:src="@{/js/modalManager.js}" defer></script>
<!-- <script th:src="@{/js/notificationFunction.js}" defer></script> -->
<script th:src="@{/js/searchFunction.js}" defer></script>
<script th:src="@{/js/editProfileFunction.js}" defer></script>
<script th:src="@{/js/tagInput.js}" defer></script>
<script th:src="@{/js/communityFunction.js}" defer></script>
<script th:src="@{/js/createPostFunction.js}" defer></script>
</body>

</html>
