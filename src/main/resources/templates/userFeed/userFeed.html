<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" th:href="@{/vector-logos/unicornLogo.png}" type="image/png">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/modals.css}">
  <link rel="stylesheet" th:href="@{/css/postCards.css}">
  <link rel="stylesheet" th:href="@{/css/userFeed.css}">
  <link rel="stylesheet" th:href="@{/css/followButton.css}">
  <link rel="stylesheet" th:href="@{/css/tagInput.css}">
  <link rel="stylesheet" th:href="@{/css/dark-mode.css}">
  <title>My Feed</title>
</head>

<body>

  <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
  <th:block th:replace="~{fragments/navbar :: notification-modal}"></th:block>
  <div th:replace="~{fragments/navbar :: search-modal}"></div>

  <div th:replace="~{fragments/modals :: create-community-modal}"></div>
  <div th:replace="~{fragments/modals :: create-post-modal}"></div>

  <div class="wrap">

    <!-- left container: main user feed-->
    <div class="left-container">
      <div class="header-left"><h3 id="feed-header-title">For You</h3></div>
      <p id="feed-section-label" class="feed-section-label"></p>
      <div class="feed-posts-list" id="feed-posts-list"></div>
    </div>

  <div class="right-wrap">
    <div class="right-container">

      <!--actions panel-->
      <div class="actions-panel">
        <div class="explore-actions">
          <button type="button" class="explore-btn" id="for-you-btn" onclick="window.location.href='/feed'">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/feedLogo.svg}" alt="" class="explore-btn-icon"> Feed</span>
          </button>
          <button type="button" class="explore-btn" id="explore-btn" onclick="window.location.href='/communities'">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/sparkleLogo.svg}" alt="" class="explore-btn-icon"> Explore Communities</span>
          </button>
          <button type="button" class="explore-btn" id="my-communities-btn" onclick="window.location.href='/my-communities'">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/clubLogo.svg}" alt="" class="explore-btn-icon"> My Communities</span>
          </button>
          <button type="button" class="explore-btn" id="create-community-toggle">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/addPostWhite.svg}" alt="" class="explore-btn-icon"> Create Community</span>
          </button>
          <button type="button" class="explore-btn" id="add-post-toggle">
            <span class="explore-btn-inner"><img th:src="@{/vector-logos/addPost.svg}" alt="" class="explore-btn-icon"> Create Post</span>
          </button>
        </div>
      </div>

      <!-- Trending Topics -->
      <div class="right-lower-container">
        <div class="header-right"><h3>Trending Topics</h3></div>
        <ul id="trending-tags-list" class="trending-tags-list"></ul>
      </div>
    </div>
  </div><!--end of right-container-->
</div><!--end of right wrap-->

  <div th:replace="~{fragments/modals :: post-view-modal}"></div>

<script src="/js/auth-guard.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => document.getElementById('for-you-btn')?.classList.add('active'));</script>
<script th:src="@{/js/darkMode.js}" defer></script>
<script th:src="@{/js/navbarPfp.js}" defer></script>
<script th:src="@{/js/modalManager.js}" defer></script>
<script th:src="@{/js/trendingTags.js}" defer></script>
<script th:src="@{/js/gifPicker.js}" defer></script>
<script th:src="@{/js/emojiPicker.js}" defer></script>
<script th:src="@{/js/tagPostsModal.js}" defer></script>
<script th:src="@{/js/postCardRenderer.js}" defer></script>
<script th:src="@{/js/tagInput.js}" defer></script>
<script th:src="@{/js/userFeedLoad.js}" defer></script>
<!-- <script th:src="@{/js/notificationFunction.js}" defer></script> -->
<script th:src="@{/js/createPostFunction.js}" defer></script>
<script th:src="@{/js/communityFunction.js}" defer></script>
<script th:src="@{/js/searchFunction.js}" defer></script>
</body>

</html>
