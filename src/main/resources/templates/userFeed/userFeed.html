<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/userFeed.css}">
  <title>My Feed</title>
</head>

<body>
<!--navigation bar-->
  <nav class="navbar">
    <div class="navbar-left">
      <img class="logo-icon" th:src="@{/vector-logos/unicornLogo.png}" alt="UniConn Logo" width="100" height="100">
      <a href="/" class="main">UniConn</a><hr><br>
    </div>

    <div class="navbar-right">
      <a href="#" class="nav-icon" title="Search" id="search-toggle">
        <img th:src="@{/vector-logos/magnifyGlass.svg}" alt="Search" width="36" height="36">
      </a>

      <a href="#" class="nav-icon" title="Add">
        <img th:src="@{/vector-logos/addPost.svg}" alt="Add Post" id="add-post-toggle" width="36" height="36">

      <a href="#" class="nav-icon" title="Notifications">
        <img th:src="@{/vector-logos/emailLogo.svg}" alt="Notifications" width="34" height="34">
      
      <a th:href="@{/profile}" class="nav-icon" title="Profile">
        <img th:src="@{/vector-logos/usernameSignIn.svg}" alt="Profile" width="26" height="36">
      </a>
      <span class="signout-divider">|</span>
      <a href="/login" class="signout-link">Sign Out</a>
    </div>
  </nav><hr><br>

<!-- search modal -->
<div id="search-modal" class="search-modal-overlay" aria-hidden="true">
    <div class="search-modal">
      <div class="header-right">
        <h3 class="search-modal-title">Search</h3>
      </div>
      <button class="search-modal-close" id="search-close" aria-label="Close">&times;</button>
      <input type="text" id="search-input" class="search-modal-input" placeholder="Search by title, username, or community...">
        <ul id="search-results" class="search-results-list"></ul>
    </div> <!-- end of search modal class-->
  </div> <!-- end of search modal overlay id-->

<!--CREATE POST MODAL-->
<div id="create-post-modal" class="search-modal-overlay" aria-hidden="true">
  <div class="search-modal create-post-modal">
    <div class="header-right">
      <h3 class="search-modal-title">Create post</h3>
    </div>

    <button class="search-modal-close" id="create-post-close" aria-label="Close">&times;</button>

    <!--select community-->
    <div class="create-post-community-wrap">
      <button type="button" class="create-post-community-btn" id="create-post-community-btn">
        Select Community <span class="create-post-arrow">&#9662;</span>
      </button>
      <ul class="create-post-community-list" id="create-post-community-list">
        <li class="create-post-community-empty">No communities available</li>
      </ul>
    </div>

    <!--input title-->
    <div class="create-post-title-wrap">
      <input type="text" id="create-post-title-input" class="create-post-title-input" placeholder="Title*" maxlength="100" required>
      <span class="create-post-char-count"><span id="create-post-title-count">0</span>/100</span>
    </div>

    <!--body text input-->
    <div class="create-post-field">
      <textarea id="create-post-body-input" class="create-post-body" placeholder="Body text" maxlength="1000"></textarea>
      <span class="create-post-char-count"><span id="create-post-body-count">0</span>/1000</span>
    </div>

    <!--post button-->
    <div class="create-post-action">
      <button type="button" class="create-post-btn-post">Post</button>
    </div>
  </div>
</div>

  <div class="wrap">
    <form action="http://localhost:9090/auth/register" method="POST"></form>
  
<!-- left container: main user feed-->
    <div class="left-container">
        <div class="header-left"><h3>For You</h3></div>
    </div>

  <div class="right-wrap">
    <div class="right-container">
<!--right upper container: recommended communities -->
    <div class="right-upper-container">
        <div class="header-right"><h3>Recommended Communities</h3></div>
    </div><br>
<!--right lower container: recommended users -->
    <div class="right-lower-container">
        <div class="header-right"><h3>Recommmended Users</h3></div>
      </div>
    </div>
  </div> <!--end of right-container-->
</div> <!--end of right wrap-->
</form>

<script th:src="@{/modalManager.js}" defer></script>
<script th:src="@{/createPostFunction.js}" defer></script>
<script th:src="@{/searchFunction.js}" defer></script>
</body>

</html>
