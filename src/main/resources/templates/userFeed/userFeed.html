<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" th:href="@{/vector-logos/unicornLogo.png}" type="image/png">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/modals.css}">
  <link rel="stylesheet" th:href="@{/css/postCards.css}">
  <link rel="stylesheet" th:href="@{/css/userFeed.css}">
  <link rel="stylesheet" th:href="@{/css/followButton.css}">
  <link rel="stylesheet" th:href="@{/css/tagInput.css}">
  <link rel="stylesheet" th:href="@{/css/dark-mode.css}">
  <title>My Feed</title>
</head>

<body>
<!--navigation bar-->
  <nav class="navbar">
    <div class="navbar-left">
      <img class="logo-icon" th:src="@{/vector-logos/unicornLogo.png}" alt="UniConn Logo" width="100" height="100">
      <a href="/feed" class="main">UniConn</a><hr><br>
    </div>

    <div class="navbar-right">
      <a href="#" class="nav-icon" title="Search" id="search-toggle">
        <img th:src="@{/vector-logos/magnifyGlass.svg}" alt="Search" width="36" height="36">
      </a>
      <!-- NOTIFICATIONS DISABLED
      <a href="#" class="nav-icon" title="Notifications" id="notification-toggle">
        <img th:src="@{/vector-logos/notifLogo.svg}" alt="Notifications" width="30" height="36">
      </a>
      -->
      <a th:href="@{/profile}" class="nav-icon" title="Profile">
        <img th:src="@{/vector-logos/usernameSignIn.svg}" alt="Profile" width="26" height="36">
      </a>
      <button id="dark-mode-toggle" class="dark-mode-btn" title="Toggle dark mode">🌙</button>
      <span class="signout-divider">|</span>
      <a href="#" class="signout-link" onclick="['token','currentUsername','currentUserId','myProfilePosts','myCommunities','profilePicture'].forEach(k=>localStorage.removeItem(k)); window.location.href='/login'; return false;">Sign Out</a>
    </div>
  </nav><hr class="navbar-divider">

<!-- NOTIFICATION MODAL DISABLED
<div id="notification-modal" class="search-modal-overlay" aria-hidden="true">
  <div class="search-modal">
    <div class="header-right">
      <h3 class="search-modal-title">Notifications</h3>
    </div>
    <button class="search-modal-close" id="notification-close" aria-label="Close">&times;</button>
    <ul id="notification-list" class="search-results-list">
      <li style="padding:12px 8px;color:#999;font-size:0.9em">No notifications yet.</li>
    </ul>
  </div>
</div>
-->

<!-- search modal -->
<div id="search-modal" class="search-modal-overlay" aria-hidden="true">
    <div class="search-modal">
      <div class="header-right">
        <h3 class="search-modal-title">Search</h3>
      </div>
      <button class="search-modal-close" id="search-close" aria-label="Close">&times;</button>
      <input type="text" id="search-input" class="search-modal-input" placeholder="Search by title, username, or community...">
        <ul id="search-results" class="search-results-list"></ul>
    </div> <!-- end of search modal class-->
  </div> <!-- end of search modal overlay id-->


<!--CREATE COMMUNITY MODAL-->
<div id="create-community-modal" class="search-modal-overlay" aria-hidden="true">
  <div class="search-modal create-post-modal">
    <div class="header-right">
      <h3 class="search-modal-title">Create Community</h3>
    </div>
    <button class="search-modal-close" id="create-community-close" aria-label="Close">&times;</button>

    <div class="create-post-title-wrap">
      <input type="text" id="community-name-input" class="create-post-title-input" placeholder="Community name*" required>
      
    </div>

    <div class="create-post-field">
      <textarea id="community-desc-input" class="create-post-body" placeholder="Description*" required></textarea>
    </div>

    <div class="create-post-title-wrap">
      <select id="community-category-input" class="create-post-title-input community-category-select">
        <option value="" disabled selected>Category*</option>
        <option value="ACADEMICS">Academics</option>
        <option value="CAREER">Career</option>
        <option value="SOCIAL">Social</option>
        <option value="CAMPUS_AND_EVENTS">Campus &amp; Events</option>
        <option value="OTHER">Other</option>
      </select>
    </div>

    <div class="create-post-title-wrap">
      <div class="tag-input-container" id="community-tags-container">
        <input type="text" id="community-tags-input" class="tag-text-input" placeholder="Press enter to add a tag">
      </div>
    </div>

    <div class="create-post-action">
      <button type="button" class="create-post-btn-post" id="create-community-submit">Create</button>
    </div>
  </div>
</div>

<!--CREATE POST MODAL-->
<div id="create-post-modal" class="search-modal-overlay" aria-hidden="true">
  <div class="search-modal create-post-modal">
    <div class="header-right">
      <h3 class="search-modal-title">Create post</h3>
    </div>

    <button class="search-modal-close" id="create-post-close" aria-label="Close">&times;</button>

    <!--post destination: profile or community-->
    <div class="create-post-community-wrap">
      <button type="button" class="create-post-community-btn" id="create-post-destination-btn">
        Post in... <span class="create-post-arrow">&#9662;</span>
      </button>
      <ul class="create-post-community-list" id="create-post-destination-list">
        <li class="create-post-community-item" id="destination-profile">My Profile</li>
        <li class="create-post-community-item" id="destination-community">Community</li>
      </ul>
    </div>

    <!--community picker (shown only when A Community is selected)-->
    <div id="create-post-community-section" class="create-post-community-wrap" style="display:none">
      <button type="button" class="create-post-community-btn" id="create-post-community-btn">
        Select Community <span class="create-post-arrow">&#9662;</span>
      </button>
      <ul class="create-post-community-list" id="create-post-community-list">
        <li class="create-post-community-empty">No communities available</li>
      </ul>
    </div>

    <!--input title-->
    <div class="create-post-title-wrap">
      <input type="text" id="create-post-title-input" class="create-post-title-input" placeholder="Title*" required>
    </div>

    <!--body text input-->
    <div class="create-post-field">
      <textarea id="create-post-body-input" class="create-post-body" placeholder="Body text*" required></textarea>
    </div>

    <div id="create-post-tags-section" class="create-post-title-wrap" style="display:none">
      <div class="tag-input-container" id="create-post-tags-container">
        <input type="text" id="create-post-tags-input" class="tag-text-input" placeholder="Press enter to add a tag">
      </div>
    </div>

	  <div class="create-post-gif-wrap">
	     <button type="button" class="gif-trigger-btn" id="post-gif-btn">GIF</button>
	   <div id="post-gif-preview"></div>
	 </div>
			
    <!--post button-->
    <div class="create-post-action">
      <button type="button" class="create-post-btn-post" id="create-post-submit">Post</button>
    </div>
  </div>
</div>

  <div class="wrap">

	<!-- left container: main user feed-->
	<div class="left-container">
  		<div class="header-left"><h3 id="feed-header-title">For You</h3></div>
  		<p id="feed-section-label" style="font-size:0.85em; color:#888; margin: -8px 0 8px 4px;"></p>
  		<div class="feed-posts-list" id="feed-posts-list"></div>
	</div>

  <div class="right-wrap">
    <div class="right-container">

<!--actions panel-->
    <div class="actions-panel">
      <div class="explore-actions">
        <button type="button" class="explore-btn" id="for-you-btn" onclick="window.location.href='/feed'">
          <span class="explore-btn-inner"><img th:src="@{/vector-logos/feedLogo.svg}" alt="" class="explore-btn-icon"> Feed</span>
        </button>
        <button type="button" class="explore-btn" id="explore-btn" onclick="window.location.href='/communities'">
          <span class="explore-btn-inner"><img th:src="@{/vector-logos/sparkleLogo.svg}" alt="" class="explore-btn-icon"> Explore Communities</span>
        </button>
        <button type="button" class="explore-btn" id="my-communities-btn" onclick="window.location.href='/my-communities'">
          <span class="explore-btn-inner"><img th:src="@{/vector-logos/clubLogo.svg}" alt="" class="explore-btn-icon"> My Communities</span>
        </button>
        <button type="button" class="explore-btn" id="create-community-toggle">
          <span class="explore-btn-inner"><img th:src="@{/vector-logos/addPostWhite.svg}" alt="" class="explore-btn-icon"> Create Community</span>
        </button>
        <button type="button" class="explore-btn" id="add-post-toggle">
          <span class="explore-btn-inner"><img th:src="@{/vector-logos/addPost.svg}" alt="" class="explore-btn-icon"> Create Post</span>
        </button>
      </div>
    </div>

<!-- Trending Topics -->
    <div class="right-lower-container">
      <div class="header-right"><h3>Trending Topics</h3></div>
      <ul id="trending-tags-list" class="trending-tags-list"></ul>
    </div>
    </div>
  </div> <!--end of right-container-->
</div> <!--end of right wrap-->


<!-- POST VIEW MODAL -->
<div id="post-view-overlay" class="post-view-overlay" aria-hidden="true">
  <div class="post-view-modal">
    <div class="post-view-header">
      <h3>Post</h3>
    </div>
    <button class="post-view-close" id="post-view-close" aria-label="Close">&times;</button>

    <div class="post-view-body">
      <!-- meta: author, community, date -->
      <div class="post-view-meta" id="post-view-meta"></div>

      <!-- title (community posts only) -->
      <p class="post-view-title" id="post-view-title" style="display:none"></p>

      <!-- full content -->
      <p class="post-view-content" id="post-view-content"></p>

      <!-- tags -->
      <div class="post-view-tags" id="post-view-tags"></div>

      <!-- like / comment count / delete -->
      <div class="post-view-footer" id="post-view-footer"></div>

      <hr class="comments-divider">

      <!-- comment input -->
	  <div class="comment-input-wrap">
	    <textarea class="comment-input" id="post-view-comment-input" placeholder="Write a comment..." rows="1" maxlength="1000"></textarea>
	    <button type="button" class="gif-trigger-btn" id="comment-gif-btn">GIF</button>
	    <div id="comment-gif-preview"></div>
	    <button class="comment-submit-btn" id="post-view-comment-submit">Post</button>
	  </div>
	  <span id="comment-char-count" class="comment-char-count">0/1000</span>

      <!-- comments list -->
      <div class="comments-list" id="post-view-comments-list">
        <p class="comment-empty">Loading comments...</p>
      </div>
    </div>
  </div>
</div>

<script src="/js/auth-guard.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => document.getElementById('for-you-btn')?.classList.add('active'));</script>
<script th:src="@{/js/darkMode.js}" defer></script>
<script th:src="@{/js/navbarPfp.js}" defer></script>
<script th:src="@{/js/modalManager.js}" defer></script>
<script th:src="@{/js/gifPicker.js}" defer></script>
<script th:src="@{/js/emojiPicker.js}" defer></script>
<script th:src="@{/js/tagPostsModal.js}" defer></script>
<script th:src="@{/js/postCardRenderer.js}" defer></script>
<script th:src="@{/js/tagInput.js}" defer></script>
<script th:src="@{/js/userFeedLoad.js}" defer></script>
<!-- <script th:src="@{/js/notificationFunction.js}" defer></script> -->
<script th:src="@{/js/createPostFunction.js}" defer></script>
<script th:src="@{/js/communityFunction.js}" defer></script>
<script th:src="@{/js/searchFunction.js}" defer></script>
</body>

</html>
