<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" th:href="@{/vector-logos/unicornLogo.png}" type="image/png">
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <title>Log In - UniConn</title>
</head>

<body>
<!--navigation bar-->
  <nav class="navbar">
    <img th:src="@{/vector-logos/unicornLogo.png}" alt="UniConn Logo" width="100">
    <a th:href="@{/login}" class="main">UniConn</a>
  </nav><hr><br><br>

    <div class="login-container">
      <form id="login-form">

    <div class="header">
      <h3>Login</h3>
    </div>

      <div class="input-box">
        <img class="icon" th:src="@{/vector-logos/usernameSignIn.svg}">
        <input type="email" name="email" required placeholder=" ">
        <label>Email</label>
      </div>

      <div class="input-box">
        <img class="icon" th:src="@{/vector-logos/passwordSignIn.svg}">
        <input type="password" name="password" required placeholder=" ">
        <label>Password</label>
      </div>

      <p id="login-error" style="color:#e05c5c;font-size:0.9em;display:none">Invalid email or password.</p>

        <div class="forgot-password">
          <a href="/forgot-password">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>
        <div class="register-link">
          <p>Don't have an account?<a href="/register"> Register!</a>
      </form>
        </div>

<script th:src="@{/js/login.js}" defer></script>
</body>

</html>
