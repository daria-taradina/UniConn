<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" th:href="@{/vector-logos/unicornLogo.png}" type="image/png">
  <link rel="stylesheet" th:href="@{/css/register.css}">
  <link rel="stylesheet" th:href="@{/css/dark-mode.css}">
  <title>Register - UniConn</title>
</head>

<body>
<!--navigation bar-->
  <nav class="navbar">
    <img th:src="@{/vector-logos/unicornLogo.png}" alt="UniConn Logo" width="100">
    <a th:href="@{/login}" class="main">UniConn</a>
    <button id="dark-mode-toggle" class="dark-mode-btn" style="margin-left:auto" title="Toggle dark mode">🌙</button>
  </nav><hr><br><br>

    <div class="login-container">
      <form id="register-form">

      <div class="header">
        <h3>Sign Up</h3>
      </div>

      <div class="input-box">
        <img class="icon" th:src="@{/vector-logos/usernameSignIn.svg}">
        <input type="text" name="username" required placeholder=" ">
        <label>Username</label>
      </div>

      <div class="input-box">
        <img class="icon" th:src="@{/vector-logos/emailLogo.svg}">
        <input type="email" name="email" required placeholder=" ">
        <label>Email</label>
      </div>

      <div class="input-box">
        <img class="icon" th:src="@{/vector-logos/passwordSignIn.svg}">
        <input type="password" name="password" required placeholder=" ">
        <label>Password</label>
        <button type="button" class="password-toggle" aria-label="Toggle password visibility"></button>
      </div>

        <p id="register-error" style="color:#e05c5c;font-size:0.9em;display:none"></p>
        <button type="submit">Register</button>
        <div class="login-link">
          <p>Already have an account?<a href="/login"> Sign In</a>
      </form>
      <script th:src="@{/js/darkMode.js}" defer></script>
      <script th:src="@{/js/passwordToggle.js}" defer></script>
      <script th:src="@{/js/register.js}" defer></script>
        </div>
</body>

</html>
