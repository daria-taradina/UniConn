<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" th:href="@{/vector-logos/unicornLogo.png}" type="image/png">
  <link rel="stylesheet" th:href="@{/css/forgotPassword.css}">
  <link rel="stylesheet" th:href="@{/css/dark-mode.css}">
  <title>Forgot Password - UniConn</title>
</head>

<body>
<!--navigation bar-->
  <nav class="navbar">
    <img class="logo-icon" th:src="@{/vector-logos/unicornLogo.png}" alt="UniConn Logo">
    <a th:href="@{/login}" class="main">UniConn</a>
    <button id="dark-mode-toggle" class="dark-mode-btn" style="margin-left:auto" title="Toggle dark mode">🌙</button>
  </nav><hr><br><br>
    <div class="login-container">
      <form id="forgot-form">

    <div class="header">
        <h3>Forgot Password</h3>
    </div>

        <div class="input-box">
          <img class="icon" th:src="@{/vector-logos/emailLogo.svg}">
          <input type="email" id="forgot-email" required placeholder=" ">
            <label>Email</label>
        </div>

        <button type="submit">Reset Password</button>
        <p id="forgot-message" class="forgot-message" style="display:none"></p>
        <div class="login-link">
          <p>Return to<a href="/login"> login</a>
      </form>
        </div>

<script th:src="@{/js/darkMode.js}" defer></script>
<script th:src="@{/js/forgotPassword.js}" defer></script>

</body>

</html>
