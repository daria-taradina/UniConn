<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/forgotPassword.css}">
  <title>Forgot Password - UniConn</title>
</head>

<body>
<!--navigation bar-->
  <nav class="navbar">
    <img th:src="@{/vector-logos/unicornLogo.png}" alt="UniConn Logo" width="110" height="100">
    <a th:href="@{/login}" class="main">UniConn</a>
  </nav><hr><br><br>
    <div class="login-container">
      <form action="http://localhost:9090/auth/register" method="POST">

    <div class="header">
        <h3>Forgot Password</h3>
    </div>

        <div class="input-box">
          <img class="icon" th:src="@{/vector-logos/emailLogo.svg}">
          <input type="email" required placeholder=" ">
            <label>Email</label>
        </div>

        <button type="submit">Reset Password</button>
        <div class="login-link">
          <p>Return to<a href="/login"> login</a>
      </form>
        </div>

</body>

</html>
